name: Validate registers

on:
  pull_request:
    paths:
      - 'registers/**'
      - '.github/scripts/compile.py'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install pyyaml jsonschema

      - run: python .github/scripts/compile.py --validate
